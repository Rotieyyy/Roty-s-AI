<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roty's AI | Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Premium Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-glass-card">
            <div class="auth-header">
                <div class="auth-logo">R</div>
                <h1 class="gradient-text">Roty's AI</h1>
                <p id="auth-subtitle">Welcome back! Sign in to continue.</p>
            </div>
            
            <div class="auth-body">
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="auth-email" placeholder="Email Address">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="auth-pass" placeholder="Password">
                </div>
                
                <div id="auth-error" class="error-msg"></div>

                <button id="btn-main-auth" class="auth-primary">Sign In</button>
                
                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="auth-toggle-text">
                    <span id="toggle-msg">Don't have an account?</span>
                    <button id="btn-switch-auth">Create Account</button>
                </div>
            </div>
            
            <button class="guest-access" onclick="closeAuth()">Use Guest Mode</button>
        </div>
    </div>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">R</div>
                    <span>Roty's AI</span>
                </div>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <i class="fas fa-plus"></i> <span>New Chat</span>
                </button>
            </div>

            <div class="history-list-area">
                <p class="section-label">History</p>
                <div id="history-list"></div>
            </div>

            <div class="sidebar-bottom">
                <div class="action-item" onclick="toggleTheme()">
                    <i class="fas fa-moon dark-only"></i>
                    <i class="fas fa-sun light-only"></i>
                    <span>Appearance</span>
                </div>
                <div class="user-profile-box">
                    <div class="user-avatar" id="user-initial">U</div>
                    <div class="user-details">
                        <span id="user-display-email">Guest Mode</span>
                        <button onclick="handleLogout()" id="logout-btn" style="display:none">Sign Out</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-workspace">
            <header class="top-nav">
                <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="engine-badge">Roty Neural v1.5</div>
                <div class="nav-right">
                    <div class="status-indicator"><span class="pulse-dot"></span> System Ready</div>
                </div>
            </header>

            <div class="chat-viewport" id="chat-viewport">
                <div class="welcome-hero" id="welcome-hero">
                    <h1 class="shimmer-text">Design. Code. Create.</h1>
                    <p>Experience the future of Roty's AI Studio.</p>
                    <div class="suggest-grid">
                        <div class="suggest-card" onclick="quickPrompt('Draw a surreal landscape of the Philippines')">
                            <i class="fas fa-wand-magic-sparkles"></i>
                            <p>Generate Art</p>
                        </div>
                        <div class="suggest-card" onclick="quickPrompt('Write a professional resume summary for an IT student')">
                            <i class="fas fa-file-lines"></i>
                            <p>Write Text</p>
                        </div>
                        <div class="suggest-card" onclick="quickPrompt('Show me a JavaScript example of an API call')">
                            <i class="fas fa-code"></i>
                            <p>Code Help</p>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <div class="input-row">
                        <label for="img-upload" class="input-icon"><i class="fas fa-image"></i></label>
                        <input type="file" id="img-upload" hidden accept="image/*">
                        <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
                        <button id="send-btn" class="send-button"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
                <p class="legal-text">Built by Roty's AI • May 2024</p>
            </footer>
        </main>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
