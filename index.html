<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roty's AI | Studio</title>
    
    <meta name="title" content="Roty's AI | Studio">
    <meta name="description" content="Hi, I'm Roty's AI, a custom neural engine developed by Roty. Join the studio to chat with advanced AI, debug code, generate stunning visual art, and build your next big project. What shall we create today?">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://roty-s-ai.vercel.app/">
    <meta property="og:title" content="Roty's AI | Studio">
    <meta property="og:description" content="Hi, I'm Roty's AI, a custom neural engine developed by Roty. Join the studio to chat with advanced AI, debug code, generate stunning visual art, and build your next big project. What shall we create today?">
    <meta property="og:image" content="https://roty-s-ai.vercel.app/rotyai.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://roty-s-ai.vercel.app/">
    <meta property="twitter:title" content="Roty's AI | Studio">
    <meta property="twitter:description" content="Hi, I'm Roty's AI, a custom neural engine developed by Roty. Join the studio to chat with advanced AI, debug code, generate stunning visual art, and build your next big project. What shall we create today?">
    <meta property="twitter:image" content="https://roty-s-ai.vercel.app/rotyai.jpg">

    <link rel="icon" type="image/x-icon" href="rotyai.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-glass-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-layer-group"></i></div>
                <h1 class="gradient-text">Roty's AI</h1>
                <p id="auth-subtitle">Welcome back! Sign in to continue.</p>
            </div>
            
            <div class="auth-body">
                <div class="social-auth-group">
                    <button id="btn-google" class="auth-social-btn"><i class="fab fa-google"></i> Continue with Google</button>
                </div>
                
                <div class="auth-divider"><span>OR EMAIL</span></div>

                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="auth-email" placeholder="Email Address">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="auth-pass" placeholder="Password">
                </div>
                
                <div class="forgot-pass-wrapper">
                    <button id="btn-forgot-pass" class="forgot-pass-link">Forgot Password?</button>
                </div>
                
                <div id="auth-error" class="error-msg"></div>
                <div id="auth-success" class="success-msg" style="display:none; color: var(--accent); font-size: 13px; margin-bottom: 15px;"></div>

                <button id="btn-main-auth" class="auth-primary">Sign In</button>
                
                <div class="auth-divider">
                    <span>CREATE</span>
                </div>

                <div class="auth-toggle-text">
                    <span id="toggle-msg">Don't have an account?</span>
                    <button id="btn-switch-auth">Sign Up</button>
                </div>
            </div>
            
            <button class="guest-access" onclick="useGuestMode()">Use Guest Mode</button>
        </div>
    </div>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">R</div>
                    <span>Roty's AI</span>
                    <button class="mobile-close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
                </div>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <i class="fas fa-plus"></i> <span>New Chat</span>
                </button>
            </div>

            <div class="history-list-area">
                <div class="history-header">
                    <p class="section-label">Recent Conversations</p>
                    <button class="clear-all-btn" onclick="deleteAllHistory()">Clear All</button>
                </div>
                <div id="history-list"></div>
                <div id="guest-history-msg" style="display:none; font-size: 12px; color: var(--text-dim); text-align: center; padding: 20px;">
                    History is disabled in Guest Mode. Sign in to save chats.
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="action-item" onclick="toggleTheme()">
                    <i class="fas fa-moon dark-only"></i>
                    <i class="fas fa-sun light-only"></i>
                    <span>Appearance</span>
                </div>
                <div class="user-profile-box">
                    <div class="user-avatar" id="user-initial">U</div>
                    <div class="user-details">
                        <span id="user-display-email">Guest Mode</span>
                        <button onclick="handleLogout()" id="logout-btn" style="display:none;">Sign Out</button>
                    </div>
                </div>
            </div>
        </aside>

        <div id="mobile-sidebar-overlay" onclick="toggleSidebar()"></div>

        <main class="main-workspace">
            <header class="top-nav">
                <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="engine-badge"><i class="fas fa-bolt"></i> Roty Neural Engine</div>
            </header>

            <div class="chat-viewport" id="chat-viewport">
                </div>

            <footer class="input-area">
                <div id="image-preview-container" class="img-preview-box" style="display: none;">
                    <img id="image-preview" src="">
                    <button onclick="clearImageUpload()"><i class="fas fa-times"></i></button>
                </div>
                <div class="input-wrapper">
                    <div class="input-row">
                        <label for="img-upload" class="input-icon" title="Upload Image"><i class="fas fa-image"></i></label>
                        <input type="file" id="img-upload" hidden accept="image/*">
                        <textarea id="user-input" placeholder="Type a message or prompt..." rows="1"></textarea>
                        <button id="send-btn" class="send-button"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <p class="legal-text">Developed by Roty</p>
            </footer>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
